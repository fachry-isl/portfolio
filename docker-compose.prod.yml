version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    deploy:
      resources:
        limits:
          memory: 400M
          cpus: "0.75"
        reservations:
          memory: 150M
    ports:
      - "3000:3000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: "0.50"
        reservations:
          memory: 20M
    ports:
      - "8080:8080"
    environment:
      - GO_ENV=production
    restart: unless-stopped
